async function lsGet(k) {
  try {
    const r = await fetch(`${GAS_URL}?action=get&key=${encodeURIComponent(k)}`);
    const j = await r.json();
    return j.value ? JSON.parse(j.value) : null;
  } catch { return null; }
}
async function lsSet(k, d) {
  try {

      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'set', key: k, value: JSON.stringify(d) })
    });

}

const E0 = () => ({preds:{},results:{}});

function scoreMatch(p,r){
  if(!p||!r)return 0;
  let s=0;
  if(r.g&&p.g===r.g)s+=3;
  for(const k of['gol','rem','fal','off','tar'])if(r[k]&&p[k]===r[k])s++;
  if(r.par&&p.par&&r.par.toLowerCase()===p.par.toLowerCase())s++;
  if(r.fin&&p.fin&&r.fin.toLowerCase()===p.fin.toLowerCase())s++;
  return s;
}

function calcStandings(g, res) {
  const t = {};
  GR[g].forEach(([n,f]) => t[n]={n,f,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0,tj:0});
  FDG.filter(m=>m[1]===g).forEach(m=>{
    const r=res?.[m[0]]; if(!r)return;
    const L=t[m[3]], V=t[m[4]]; if(!L||!V)return;
    let gl=NaN, gv=NaN;
    if(r.fin){const p=r.fin.trim().split('-').map(Number); if(p.length===2&&p.every(x=>!isNaN(x)&&x>=0)){gl=p[0];gv=p[1];}}
    if(!isNaN(gl)&&!isNaN(gv)){
      L.pj++;V.pj++;L.gf+=gl;L.gc+=gv;L.dg+=gl-gv;V.gf+=gv;V.gc+=gl;V.dg+=gv-gl;
      if(r.cl)L.tj+=Number(r.cl)||0; if(r.cv)V.tj+=Number(r.cv)||0;
      if(gl>gv){L.pg++;L.pts+=3;V.pp++;}
      else if(gl===gv){L.pe++;L.pts++;V.pe++;V.pts++;}
      else{V.pg++;V.pts+=3;L.pp++;}
    } else if(r.g){
      L.pj++;V.pj++;
      if(r.g==='L'){L.pg++;L.pts+=3;V.pp++;}
      else if(r.g==='E'){L.pe++;L.pts++;V.pe++;V.pts++;}
      else{V.pg++;V.pts+=3;L.pp++;}
    }
  });
  return Object.values(t).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.tj-b.tj);
}

function resolveRef(ref,fR,eR){
  const gm=ref.match(/^(\d)° Grupo ([A-L])$/);
  if(gm){const s=calcStandings(gm[2],fR);const i=parseInt(gm[1])-1;return s[i]?`${s[i].f} ${s[i].n}`:ref;}
  const gn=ref.match(/^Gan\. P(\d+)$/);
  if(gn){const id=parseInt(gn[1]),r=eR?.[id];if(!r?.fin)return ref;const[gl,gv]=r.fin.split('-').map(Number);if(isNaN(gl)||isNaN(gv))return ref;const m=ELIM.find(x=>x[0]===id);if(!m)return ref;return gl>gv?resolveRef(m[3],fR,eR):resolveRef(m[4],fR,eR);}
  const pn=ref.match(/^Perd\. P(\d+)$/);
  if(pn){const id=parseInt(pn[1]),r=eR?.[id];if(!r?.fin)return ref;const[gl,gv]=r.fin.split('-').map(Number);if(isNaN(gl)||isNaN(gv))return ref;const m=ELIM.find(x=>x[0]===id);if(!m)return ref;return gl>gv?resolveRef(m[4],fR,eR):resolveRef(m[3],fR,eR);}
  return ref;
}

  const show=['DS','PM'];
  if(code==='DC'||code==='DCD')show.push('CH');

}

// Convierte "JUE 11-jun 15:00" a Date comparable (año 2026 implícito)
const MES = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11,
              ene:0,abr:3,may2:4};
function matchDate(dateStr) {
  // formato: "JUE 11-jun 15:00"
  const m = dateStr.match(/(\d+)-(\w+)\s+(\d+):(\d+)/);
  if (!m) return new Date(9999,0,1);
  const day = parseInt(m[1]);
  const monStr = m[2].toLowerCase();
  const hour = parseInt(m[3]), min = parseInt(m[4]);
  const monMap = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const mon = monMap[monStr] ?? 5;
  return new Date(2026, mon, day, hour, min);
}

function getNextMatches(fdgResults, elimResults, n=3) {
  const now = new Date();
  const allMatches = [
    ...FDG.map(m=>({id:m[0],type:'fdg',date:matchDate(m[2]),label:m[2],
      local:`${m[5]} ${m[3]}`,visita:`${m[6]} ${m[4]}`,
      bcCode:BC[String(m[0])],
      played:!!(fdgResults?.[m[0]]?.g || fdgResults?.[m[0]]?.fin)})),
    ...ELIM.map(m=>({id:m[0],type:'elim',date:matchDate(m[2]),label:m[2],
      local:m[3],visita:m[4],
      bcCode:BCE[m[1]]||'DC',rnd:RL[m[1]]||m[1],
      played:!!(elimResults?.[m[0]]?.g || elimResults?.[m[0]]?.fin)}))
  ];
  return allMatches
    .filter(m=>!m.played)
    .sort((a,b)=>a.date-b.date)
    .slice(0,n);
}

    ...ms.map(m=>e(MatchCard,{key:m[0],m,isAdmin,user,allPreds:fdg.preds,result:fdg.results?.[m[0]],onVote,onResult,bcCode:BC[String(m[0])]}))
  );
}

function PosicionesView({ fdg }) {
  const e=React.createElement;
  return e('div',{className:'view'},
    e('div',{className:'sec'},'📊 Posiciones por grupo'),
    e('div',{className:'grd'},...GK.map(g=>{const s=calcStandings(g,fdg.results);return e('div',{key:g,className:'gt'},
      e('div',{className:'gth'},'Grupo '+g),
      e('div',{className:'gtw'},e('table',{className:'st'},
        e('thead',null,e('tr',null,e('th',null,'Equipo'),...['PJ','PG','PE','PP','GF','GC','DG','PTS'].map(h=>e('th',{key:h},h)))),
        e('tbody',null,...s.map((t,i)=>e('tr',{key:t.n},
          e('td',null,e('span',{style:{display:'inline-flex',alignItems:'center',justifyContent:'center',width:15,height:15,borderRadius:'50%',background:i<2?'#0F1C3F':'#f1f5f9',color:i<2?'#F59E0B':'#94a3b8',fontSize:9,fontWeight:500,marginRight:3}},i+1),t.f+' '+t.n),
          e('td',null,t.pj),e('td',null,t.pg),e('td',null,t.pe),e('td',null,t.pp),e('td',null,t.gf),e('td',null,t.gc),
          e('td',{style:{fontWeight:500,color:t.dg>0?'#16A34A':t.dg<0?'#DC2626':'inherit'}},(t.dg>0?'+':'')+t.dg),
          e('td',{style:{fontWeight:500}},t.pts)
        )))
      ))
    );})),
    e('div',{className:'hint'},'★ GF/GC/DG desde marcador exacto · PJ/PTS actualizan desde Ganador')
  );
}

function EliminatoriasView({ user, isAdmin, elim, fdg, onVote, onResult }) {
  const [rnd,setRnd]=React.useState('R32');
  const e=React.createElement;
  return e('div',{className:'view'},
    e('div',{className:'sec'},'🏟️ Eliminatorias'),
    e('div',{className:'filt'},...['R32','8vos','4tos','Semi','3er','Final'].map(r=>e('button',{key:r,className:`fb${rnd===r?' on':''}`,onClick:()=>setRnd(r)},RL[r]||r))),
    ...ELIM.filter(m=>m[1]===rnd).map(m=>e(MatchCard,{key:m[0],m,isAdmin,user,allPreds:elim.preds,result:elim.results?.[m[0]],onVote:(id,k,v)=>onVote(id,k,v,'elim'),onResult:(id,k,v)=>onResult(id,k,v,'elim'),isElim:true,fRes:fdg.results,eRes:elim.results,bcCode:BCE[m[1]]||'DC'}))
  );
}

function CampeonView({ user, isAdmin, champ, onVote, onReal }) {
  const real=champ.real||'';
  const e=React.createElement;
  return e('div',{className:'view'},
    e('div',{className:'sec'},'🏆 Campeón mundial'),
    isAdmin&&e('div',{style:{background:'#0F1C3F',borderRadius:8,padding:'10px 13px',marginBottom:10,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
      e('label',{style:{color:'#F59E0B',fontWeight:500,fontFamily:'Georgia,serif',fontSize:13}},'Campeón real:'),
      e('select',{value:real,onChange:ev=>onReal(ev.target.value),style:{padding:'5px 10px',borderRadius:6,border:'1px solid #F59E0B',background:'#1E3A6B',color:'#fff',fontSize:13,fontFamily:'inherit'}},
        e('option',{value:''},'— Por definir —'),...ALL_TEAMS.map(t=>e('option',{key:t,value:t},t)))
    ),
    !isAdmin&&real&&e('div',{style:{background:'#0F1C3F',color:'#F59E0B',borderRadius:8,padding:'8px 13px',marginBottom:10,fontFamily:'Georgia,serif',fontSize:13}},'🏆 Campeón: '+real),
    e('div',{className:'tbl'},...PLAYERS.map(p=>{const v=champ.votes?.[p]||'',isMe=p===user&&!isAdmin,ok=real&&v&&v.toUpperCase()===real.toUpperCase();return e('div',{key:p,className:'chr'},
      e('div',{style:{fontWeight:500,fontSize:13,color:PC[p],minWidth:76}},p),
      isMe?e('select',{value:v,onChange:ev=>onVote(ev.target.value),style:{padding:'5px 10px',borderRadius:6,border:'1px solid #e2e8f0',background:'#f1f5f9',color:'#1e293b',fontSize:13,fontFamily:'inherit',flex:1}},e('option',{value:''},'— Elige tu campeón —'),...ALL_TEAMS.map(t=>e('option',{key:t,value:t},t))):
      e('div',{style:{fontWeight:500,fontSize:13,color:ok?'#16A34A':'#1e293b'}},v||'—',real&&v&&e('span',{style:{marginLeft:4,fontWeight:500}},ok?'✓ acertó':'✗'))
    );})),
    e('div',{className:'hint'},'El campeón no suma puntos — solo muestra quién acertó.')
  );
}

function App() {
  const [user,setUser]=useState(()=>{try{return localStorage.getItem('cn_user');}catch{return null;}});
  const [isAdmin,setIsAdmin]=useState(()=>{try{return localStorage.getItem('cn_admin')==='1';}catch{return false;}});
  const [tab,setTab]=useState('tabla');
  const [fdg,setFdg]=useState(E0());
  const [elim,setElim]=useState(E0());
  const [champ,setChamp]=useState({votes:{},real:null});
  const [sync,setSync]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [confirmClear,setConfirmClear]=useState(false);
  const fdgRef=useRef(fdg); const elimRef=useRef(elim); const champRef=useRef(champ);
  useEffect(()=>{fdgRef.current=fdg;},[fdg]);
  useEffect(()=>{elimRef.current=elim;},[elim]);
  useEffect(()=>{champRef.current=champ;},[champ]);

  const loadAll=useCallback(async()=>{
    const[f,e,c]=await Promise.all([lsGet(SK.fdg),lsGet(SK.elim),lsGet(SK.champs)]);
    if(f)setFdg(f); if(e)setElim(e); if(c)setChamp(c);
    setSync({ts:Date.now(),label:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  },[]);

  useEffect(()=>{loadAll();const t=setInterval(loadAll,20000);return()=>clearInterval(t);},[loadAll]);

  const handleSync=async()=>{setSyncing(true);await loadAll();setSyncing(false);};
  const login=(n,a)=>{setUser(n);setIsAdmin(a);try{localStorage.setItem('cn_user',n);localStorage.setItem('cn_admin',a?'1':'0');}catch{}};

  const vote=useCallback((id,k,v,type='fdg')=>{
    const [setD,ref,KEY]=type==='fdg'?[setFdg,fdgRef,SK.fdg]:[setElim,elimRef,SK.elim];
    setD(prev=>{const next={preds:{...prev.preds,[id]:{...prev.preds[id],[user]:{...(prev.preds[id]?.[user]||{}),[k]:v}}},results:prev.results};lsSet(KEY,{preds:{...ref.current.preds,[id]:{...ref.current.preds[id],[user]:{...(ref.current.preds[id]?.[user]||{}),[k]:v}}},results:ref.current.results});return next;});
  },[user]);

  const result=useCallback((id,k,v,type='fdg')=>{
    const [setD,ref,KEY]=type==='fdg'?[setFdg,fdgRef,SK.fdg]:[setElim,elimRef,SK.elim];
    setD(prev=>{const next={preds:prev.preds,results:{...prev.results,[id]:{...prev.results[id],[k]:v}}};lsSet(KEY,{preds:ref.current.preds,results:{...ref.current.results,[id]:{...ref.current.results[id],[k]:v}}});return next;});
  },[]);

  const cVote=useCallback(t=>{setChamp(p=>{const n={...p,votes:{...p.votes,[user]:t}};lsSet(SK.champs,{...champRef.current,votes:{...champRef.current.votes,[user]:t}});return n;});},[user]);
  const cReal=useCallback(t=>{setChamp(p=>{const n={...p,real:t};lsSet(SK.champs,{...champRef.current,real:t});return n;});},[]);

  const clearAll=async()=>{
    const nF={preds:{},results:fdgRef.current.results};
    const nE={preds:{},results:elimRef.current.results};
    const nC={votes:{},real:champRef.current.real};
    setFdg(nF);setElim(nE);setChamp(nC);await Promise.all([lsSet(SK.fdg,nF),lsSet(SK.elim,nE),lsSet(SK.champs,nC)]);setConfirmClear(false);
  };

  if(!user)return React.createElement(React.Fragment,null,React.createElement('style',null,css),React.createElement(LoginScreen,{onLogin:login}));

  const tabs=[{id:'tabla',l:'🏆 Tabla'},{id:'grupos',l:'⚽ Grupos'},{id:'pos',l:'📊 Posiciones'},{id:'elim',l:'🏟️ Elim.'},{id:'camp',l:'🏆 Campeón'}];
  const e=React.createElement;

  return e(React.Fragment,null,
    e('style',null,css),
    e('div',{className:'hdr'},
      e('div',{className:'logo'},'SAL DE LA NORIA ',e('em',null,'· Mundial 2026')),
      e('div',{className:'hacts'},
        e(SyncBtn,{sync,syncing,onClick:handleSync}),
        isAdmin&&(confirmClear
          ?e('span',{style:{display:'flex',gap:5,alignItems:'center'}},
              e('span',{style:{fontSize:11,color:'#FCA5A5'}},'¿Borrar predicciones?'),
              e('button',{onClick:clearAll,style:{background:'#B91C1C',border:'none',borderRadius:5,padding:'3px 8px',color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:500}},'Sí'),
              e('button',{className:'hb',onClick:()=>setConfirmClear(false)},'No')
            )
          :e('button',{className:'clr-btn',onClick:()=>setConfirmClear(true)},'🗑 Limpiar')
        ),
        e('div',{className:'ubadge',onClick:()=>{try{localStorage.removeItem('cn_user');localStorage.removeItem('cn_admin');}catch{}setUser(null);setIsAdmin(false);}},`${isAdmin?'🔧':'👤'} ${user}`)
      )
    ),
    e('div',{className:'nav'},...tabs.map(t=>e('button',{key:t.id,className:`ntab${tab===t.id?' on':''}`,onClick:()=>setTab(t.id)},t.l))),
    tab==='tabla'&&e(Tabla,{fdg,elim,champ}),
    tab==='grupos'&&e(GruposView,{user,isAdmin,fdg,onVote:vote,onResult:result}),
    tab==='pos'&&e(PosicionesView,{fdg}),
    tab==='elim'&&e(EliminatoriasView,{user,isAdmin,elim,fdg,onVote:vote,onResult:result}),
    tab==='camp'&&e(CampeonView,{user,isAdmin,champ,onVote:cVote,onReal:cReal})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
