    return j.value ? JSON.parse(j.value) : null;

}

function scoreMatch(p,r,isElim){
  if(!p||!r)return 0;
  let s=0;
  if(r.g&&p.g===r.g)s+=3;
  for(const k of['gol','rem','fal','off','tar'])if(r[k]&&p[k]===r[k])s++;
  if(r.par&&p.par&&r.par.toLowerCase()===p.par.toLowerCase())s++;
  if(r.res90&&p.res90&&r.res90.toLowerCase()===p.res90.toLowerCase())s++;
  if(r.fin&&p.fin&&r.fin.toLowerCase()===p.fin.toLowerCase())s++;
  if(isElim){
    if(r.ala&&p.ala===r.ala)s+=2;
    if(r.pen&&p.pen===r.pen)s+=2;
  }
  return s;
}
// Feedback por categoría: 'ok'|'bad'|null
// En elim, 'E' es una opción válida de botón — quien votó 'E' gana si el resultado es 'E'
function catResult(k,p,r){
  if(!r||!p)return null;
  const rv=r[k]; const pv=p[k];
  if(!rv||!pv)return null;
  return pv===rv?'ok':'bad';
}

function calcStandings(g, res) {
  const t = {};
  GR[g].forEach(([n,f]) => t[n]={n,f,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0,tj:0});
  FDG.filter(m=>m[1]===g).forEach(m=>{
    const r=res?.[m[0]]; if(!r)return;
    const L=t[m[3]], V=t[m[4]]; if(!L||!V)return;
    let gl=NaN, gv=NaN;
    if(r.fin){const p=r.fin.trim().split('-').map(Number); if(p.length===2&&p.every(x=>!isNaN(x)&&x>=0)){gl=p[0];gv=p[1];}}
    if(!isNaN(gl)&&!isNaN(gv)){
      L.pj++;V.pj++;L.gf+=gl;L.gc+=gv;L.dg+=gl-gv;V.gf+=gv;V.gc+=gl;V.dg+=gv-gl;
      if(r.cl)L.tj+=Number(r.cl)||0; if(r.cv)V.tj+=Number(r.cv)||0;
      if(gl>gv){L.pg++;L.pts+=3;V.pp++;}
      else if(gl===gv){L.pe++;L.pts++;V.pe++;V.pts++;}
      else{V.pg++;V.pts+=3;L.pp++;}
    } else if(r.g){
      L.pj++;V.pj++;
      if(r.g==='L'){L.pg++;L.pts+=3;V.pp++;}
      else if(r.g==='E'){L.pe++;L.pts++;V.pe++;V.pts++;}
      else{V.pg++;V.pts+=3;L.pp++;}
    }
  });
  return Object.values(t).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.tj-b.tj);
}

// Calcula los mejores terceros de todos los grupos, ordenados por criterios FIFA
function getBestThirds(fR) {
  // Criterio FIFA oficial: PTS → DG → GF → Fair Play (menos tarjetas) → Ranking FIFA (no disponible, orden alfabético como fallback)
  return GK
    .map(g => { const s = calcStandings(g, fR); const t = s[2]; return t ? {...t, grp: g} : null; })
    .filter(Boolean)
    .sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.tj-b.tj || a.n.localeCompare(b.n));
}

// Tabla FIFA: dado el conjunto de grupos de los 8 mejores terceros (ordenados alfabéticamente),
// indica qué tercero (por índice 0-7 en el ranking) va a qué partido (por ID).
// La asignación de mejores terceros a partidos específicos usa el Anexo C de FIFA
// con 495 combinaciones según qué grupos produjeron los 8 mejores terceros.
// No es posicional — el admin debe asignarlos manualmente una vez conocidos los 8.
// Los datos se guardan en eRes bajo la clave 'b3slots': { matchId: {n, f} }
function getB3Slots(eR) {
  return eR?.b3slots || {};
}

function resolveRef(ref, fR, eR, b3assigned, matchId) {
  // Direct hardcoded team with flag emoji — return as-is
  if(ref && /^\p{Emoji}/u.test(ref)) return ref;

  // 1°/2° de grupo
  const gm = ref && ref.match(/^(\d)° Grupo ([A-L])$/);
  if(gm){ const s=calcStandings(gm[2],fR); const i=parseInt(gm[1])-1; return s[i]?`${s[i].f} ${s[i].n}`:ref; }

  // Mejor 3° — asignación manual del admin
  if(ref==='Mejor 3°') {
    if(b3assigned && matchId && b3assigned[matchId]) {
      const t = b3assigned[matchId];
      return `${t.f} ${t.n}`;
    }
    const b3 = getBestThirds(fR);
    const done = GK.filter(g => { const s=calcStandings(g,fR); return s.length>0&&s[0].pj===3; }).length;
    if(done < 12 || b3.length === 0) return 'Mejor 3° ⏳';
    return 'Mejor 3° (sin asignar)';
  }

  // Gan. PXX
  const gn = ref && ref.match(/^Gan\. P(\d+)$/);
  if(gn){ const id=parseInt(gn[1]),r=eR?.[id]; if(!r?.fin)return ref; const[gl,gv]=r.fin.split('-').map(Number); if(isNaN(gl)||isNaN(gv))return ref; const m=ELIM.find(x=>x[0]===id); if(!m)return ref; return gl>gv?resolveRef(m[3],fR,eR,b3assigned,id):resolveRef(m[4],fR,eR,b3assigned,id); }

  // Perd. PXX
  const pn = ref && ref.match(/^Perd\. P(\d+)$/);
  if(pn){ const id=parseInt(pn[1]),r=eR?.[id]; if(!r?.fin)return ref; const[gl,gv]=r.fin.split('-').map(Number); if(isNaN(gl)||isNaN(gv))return ref; const m=ELIM.find(x=>x[0]===id); if(!m)return ref; return gl>gv?resolveRef(m[4],fR,eR,b3assigned,id):resolveRef(m[3],fR,eR,b3assigned,id); }

  return ref;
}

function Chips({code}){
  const show=['DS','PM'];
  if(code==='DC'||code==='DCD')show.push('CH');
  if(code==='DD'||code==='DCD')show.push('DP');
  return React.createElement('span',{style:{display:'inline-flex',gap:2,verticalAlign:'middle',flexWrap:'wrap'}},

  );
}

// Convierte "JUE 11-jun 15:00" a Date comparable (año 2026 implícito)
const MES = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11,
              ene:0,abr:3,may2:4};
function matchDate(dateStr) {
  // formato: "JUE 11-jun 15:00"
  const m = dateStr.match(/(\d+)-(\w+)\s+(\d+):(\d+)/);
  if (!m) return new Date(9999,0,1);
  const day = parseInt(m[1]);
  const monStr = m[2].toLowerCase();
  const hour = parseInt(m[3]), min = parseInt(m[4]);
  const monMap = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const mon = monMap[monStr] ?? 5;
  return new Date(2026, mon, day, hour, min);
}

function getNextMatches(fdgResults, elimResults, n=3) {
  const now = new Date();
  const eR = elimResults || {};
  const fR = fdgResults || {};
  const b3slots = getB3Slots(eR);
  const allMatches = [
    ...FDG.map(m=>({id:m[0],type:'fdg',date:matchDate(m[2]),label:m[2],
      local:`${m[5]} ${m[3]}`,visita:`${m[6]} ${m[4]}`,
      bcCode:BC[String(m[0])],
      played:!!(fR[m[0]]?.g || fR[m[0]]?.fin)})),
    ...ELIM.map(m=>({id:m[0],type:'elim',date:matchDate(m[2]),label:m[2],
      local:resolveRef(m[3],fR,eR,b3slots,m[0]),
      visita:resolveRef(m[4],fR,eR,b3slots,m[0]),
      bcCode:BCE[m[1]]||'DC',rnd:RL[m[1]]||m[1],
      played:!!(eR[m[0]]?.g || eR[m[0]]?.fin)}))
  ];
  return allMatches
    .filter(m=>!m.played)
    .sort((a,b)=>a.date-b.date)
    .slice(0,n);
}

// Returns set of eliminated team names based on elim results
function getEliminatedTeams(fR, eR) {
  const eliminated = new Set();
  const b3slots = getB3Slots(eR||{});
  ELIM.forEach(m => {
    const r = (eR||{})[m[0]];
    if(!r?.fin) return;
    const [gl,gv] = r.fin.split('-').map(Number);
    if(isNaN(gl)||isNaN(gv)) return;
    // loser
    const loserRef = gl >= gv ? m[4] : m[3]; // if gl>gv local wins, visita loses
    if(gl === gv) return; // no loser in draw (penales handled by 'g')
    const loserName = resolveRef(loserRef, fR, eR||{}, b3slots, m[0]);
    // Extract just the team name (remove flag prefix)
    const name = loserName.replace(/^\S+\s/, '').trim();
    eliminated.add(name);
    eliminated.add(loserName); // also add full string
  });
  return eliminated;
}

function FixtureBracket({ elim, fdg }) {
  const e = React.createElement;
  const fRes = fdg.results || {};
  const eRes = elim.results || {};
  const b3assigned = getB3Slots(eRes);

  function res(ref, mid) { return resolveRef(ref, fRes, eRes, b3assigned, mid); }

  function getWinner(matchId) {
    const r = eRes[matchId];
    if (!r || !r.fin) return null;
    const [gl, gv] = r.fin.split('-').map(Number);
    if (isNaN(gl) || isNaN(gv)) return null;
    const m = ELIM.find(x => x[0] === matchId);
    if (!m) return null;
    return gl > gv ? res(m[3], matchId) : gl < gv ? res(m[4], matchId) : null;
  }

  function getScore(matchId) {
    const r = eRes[matchId];
    if (!r || !r.fin) return null;
    return r.fin;
  }

  // One match card for the bracket
  function BkCard({ matchId, label }) {
    const m = ELIM.find(x => x[0] === matchId);
    const r = eRes[matchId] || {};
    const tL = m ? res(m[3], matchId) : '?';
    const tV = m ? res(m[4], matchId) : '?';
    const score = getScore(matchId);
    const done = !!score;
    const [gl, gv] = score ? score.split('-').map(Number) : [null, null];
    const wL = done && gl > gv, wV = done && gv > gl;

    const isTbd = t => !t || t.includes('Gan.') || t.includes('Perd.') || t.includes('Mejor') || t.includes('⏳') || t === '?';

    const teamRow = (name, isWin, isLose, sc) => {
      const tbd = isTbd(name);
      const nc = tbd ? 'bk-tname tbd' : isWin ? 'bk-tname win' : isLose ? 'bk-tname lose' : 'bk-tname known';
      return e('div', { className: 'bk-team' + (isWin ? ' winner' : '') },
        e('span', { className: nc }, tbd ? (name || '?') : name),
        sc !== null && sc !== undefined && e('span', { className: 'bk-score' + (isLose ? ' lose' : '') }, sc)
      );
    };

    return e('div', { className: 'bk-card' + (done ? ' done' : '') },
      label && e('div', { className: 'bk-card-lbl' }, label),
      e('div', { className: 'bk-mid' }, '#' + matchId),
      teamRow(tL, wL, wV, done ? gl : null),
      teamRow(tV, wV, wL, done ? gv : null),
      e('div', { className: 'bk-date' },
        (() => {
          if (!m) return '';
          const meta = ELIM_META[matchId];
          const ch = meta ? meta[2] : '';
          const show = ['DS','PM'];
          if(ch==='DC'||ch==='DCD') show.push('CH');
          if(ch==='DD'||ch==='DCD') show.push('DP');
          const chips = show.map(k => {
            const {bg,tx,nm} = CH[k];
            return e('span',{key:k,style:{fontSize:8,fontWeight:700,padding:'1px 3px',borderRadius:3,background:bg,color:tx,marginRight:2}},nm);
          });
          return e('div',{style:{display:'flex',flexWrap:'wrap',alignItems:'center',gap:2}},
            e('span',{style:{marginRight:4}}, m[2] + (meta ? ' · ' + meta[0] + ', ' + meta[1] : '')),
            ...chips
          );
        })()
      )
    );
  }

  // A bracket column: array of matchIds
  function Col({ ids, label }) {
    return e('div', { className: 'bk-col' },
      label && e('div', { className: 'bk-col-lbl' }, label),
      ...ids.map(id => e('div', { key: id, className: 'bk-slot' },
        e(BkCard, { matchId: id })
      ))
    );
  }

  // Champion
  const finalRes = eRes[104] || {};
  const champName = getWinner(104);
  const thirdName = getWinner(103);

  return e('div', { className: 'bk-wrap2' },

    // TROPHY at top if champion known
    champName && e('div', { className: 'bk-trophy' },
      e('div', { className: 'bk-trophy-box' },
        e('div', { className: 'bk-trophy-cup' }, '🏆'),
        e('div', { className: 'bk-trophy-name' }, champName),
        e('div', { className: 'bk-trophy-sub' }, 'Campeón Mundial 2026')
      )
    ),

    // ── MITAD SUPERIOR ──
    e('div', { className: 'bk-half-lbl' }, '── Mitad Superior ──'),

    e('div', { className: 'bk-bracket' },
      // R32 col A
      e('div', { className: 'bk-col' },
        e('div', { className: 'bk-col-lbl' }, 'Ronda 32'),
        e('div', { className: 'bk-slot' }, e(BkCard, { matchId: 74 })),
        e('div', { className: 'bk-slot' }, e(BkCard, { matchId: 77 })),
        e('div', { className: 'bk-spacer' }),
        e('div', { className: 'bk-slot' }, e(BkCard, { matchId: 73 })),
        e('div', { className: 'bk-slot' }, e(BkCard, { matchId: 75 })),
        e('div', { className: 'bk-spacer2' }),

        e('div', { className: 'bk-slot' }, e(BkCard, { matchId: 82 })),
      ),
      // Connector + 8vos
      e('div', { className: 'bk-col bk-col-narrow' },
        e('div', { className: 'bk-col-lbl' }, 'Octavos'),
        e('div', { className: 'bk-slot bk-paired' },
          e('div', { className: 'bk-line-top' }),
          e(BkCard, { matchId: 89 }),

function B3AdminPanel({ elim, fdg, onResult }) {
  const e = React.createElement;
  const fRes = fdg.results || {};
  const eRes = elim.results || {};
  const b3slots = getB3Slots(eRes);
  const b3ranking = getBestThirds(fRes);
  const groupsDone = GK.filter(g => { const s=calcStandings(g,fRes); return s.length>0&&s[0].pj===3; }).length;

  // Partidos con "Mejor 3°"
  const b3matches = ELIM.filter(m => m[3]==='Mejor 3°' || m[4]==='Mejor 3°');

  const saveSlot = (matchId, teamStr) => {
    // teamStr: "🇦🇷 ARGENTINA" → split en bandera y nombre
    const parts = teamStr.trim().split(' ');
    const f = parts[0];
    const n = parts.slice(1).join(' ');
    const newSlots = {...b3slots, [matchId]: {f, n}};
    onResult('b3slots', null, JSON.stringify(newSlots));
  };
  const clearSlot = (matchId) => {
    const newSlots = {...b3slots};
    delete newSlots[matchId];
    onResult('b3slots', null, JSON.stringify(newSlots));
  };

  return e('div',{style:{background:'#0F1C3F',border:'1px solid #1E3A6B',borderRadius:12,padding:12,marginBottom:10}},
    e('div',{style:{fontWeight:700,color:'#F59E0B',fontSize:12,marginBottom:6}},'🔧 ADMIN · Asignación de Mejores Terceros'),
    e('div',{style:{fontSize:10,color:'#64748b',marginBottom:8}},
      `Grupos terminados: ${groupsDone}/12. `+
      (groupsDone<12 ? 'Espera a que terminen todos los grupos.' :
        'La FIFA publicará los cruces oficiales según el Anexo C (495 combinaciones). Asígnalos aquí.')
    ),
    groupsDone >= 8 && e('div',{style:{marginBottom:8}},
      e('div',{style:{fontSize:10,color:'#F59E0B',fontWeight:600,marginBottom:4}},'Ranking actual (top 8 clasifican):'),
      b3ranking.slice(0,12).map((t,i) =>
        e('div',{key:t.n,style:{display:'flex',alignItems:'center',gap:6,padding:'2px 0',opacity:i>=8?0.4:1}},
          e('span',{style:{fontSize:10,color:i<8?'#F59E0B':'#94a3b8',minWidth:16,fontWeight:700}},i+1+'.'),
          e('span',{style:{fontSize:11,color:'#e2e8f0'}},`${t.f} ${t.n}`),
          e('span',{style:{fontSize:9,color:'#64748b'}},'Gr.'+t.grp),
          e('span',{style:{fontSize:9,color:'#94a3b8'}},`${t.pts}pts DG${t.dg>0?'+':''}${t.dg} GF${t.gf} Tarj${t.tj}`)
        )
      )
    ),
    e('div',{style:{fontSize:10,color:'#F59E0B',fontWeight:600,marginBottom:6,marginTop:8}},'Asignar a cada partido:'),
    b3matches.map(m =>
      e('div',{key:m[0],style:{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexWrap:'wrap'}},
        e('span',{style:{fontSize:10,color:'#94a3b8',minWidth:60}},'P'+m[0]+' ('+m[2].split(' ')[0]+')'),
        e('select',{
          value: b3slots[m[0]] ? `${b3slots[m[0]].f} ${b3slots[m[0]].n}` : '',
          onChange: ev => ev.target.value ? saveSlot(m[0], ev.target.value) : clearSlot(m[0]),

        },

        e('option',{value:''},'— Por definir —'),...ALL_TEAMS.map(t=>e('option',{key:t,value:t},t)))
    ),
    !isAdmin&&real&&e('div',{style:{background:'#0F1C3F',color:'#F59E0B',borderRadius:8,padding:'8px 13px',marginBottom:10,fontFamily:'Georgia,serif',fontSize:13}},'🏆 Campeón: '+real),
    e('div',{className:'tbl'},...PLAYERS.map(p=>{const v=champ.votes?.[p]||'',ok=real&&v&&v.toUpperCase()===real.toUpperCase();return e('div',{key:p,className:'chr'},
      e('div',{style:{fontWeight:500,fontSize:13,color:PC[p],minWidth:76}},p),
      v
        ? e('div',{style:{display:'flex',alignItems:'center',gap:6,flex:1}},
            e('div',{style:{fontWeight:500,fontSize:13,color:ok?'#16A34A':'#1e293b'}},v),
            real&&e('span',{style:{fontWeight:500,fontSize:12}},ok?'✓ acertó':'✗'),
            e('span',{style:{fontSize:11,color:'#94a3b8'}},'🔒')
          )
        : e('div',{style:{fontSize:12,color:'#94a3b8',fontStyle:'italic'}},'— sin voto —')
    );})),
    e('div',{className:'hint'},'El campeón no suma puntos — solo muestra quién acertó.')
  );
}


function ReglasView() {
  const e = React.createElement;
  const sec = (title) => e('div',{style:{fontWeight:700,color:'#F59E0B',fontSize:13,marginTop:18,marginBottom:6,fontFamily:'Georgia,serif',borderBottom:'1px solid #1E3A6B',paddingBottom:4}},title);
  const row = (cat,pts,desc) => e('div',{style:{display:'flex',gap:8,alignItems:'flex-start',padding:'4px 0',borderBottom:'1px solid #f1f5f9'}},
    e('div',{style:{minWidth:120,fontSize:12,fontWeight:500,color:'#1e293b'}},cat),
    e('div',{style:{minWidth:36,fontSize:12,fontWeight:700,color:'#F59E0B',textAlign:'right',flexShrink:0}},pts),
    e('div',{style:{fontSize:11,color:'#64748b',flex:1}},desc)
  );
  return e('div',{className:'view'},
    e('div',{className:'sec'},'📋 Reglas y Puntajes'),
    e('div',{style:{background:'#fff',borderRadius:12,padding:16,border:'1px solid #e2e8f0'}},

      sec('⚽ Fase de Grupos — 10 pts por partido'),
      row('Ganador','+3','Local / Empate / Visita (incluye opción Empate)'),
      row('1° Gol','+1','Local / Visita / Sin goles'),
      row('Más remates al arco','+1','Local / Visita'),
      row('Más faltas','+1','Local / Visita'),
      row('Más offsides','+1','Local / Visita'),
      row('Tarjetas por equipo','+1','Local / Visita'),
      row('Parcial 1° tiempo','+1','Marcador exacto al 45\''),
      row('Resultado final','+1','Marcador exacto al 90\''),

      sec('🏟 Fase Eliminatoria — 15 pts por partido'),
      row('Ganador (clasifica)','+3','Solo Local / Visita — sin Empate'),
      row('1° Gol','+1','Local / Visita / Sin goles'),
      row('Más remates al arco','+1','Local / Empate / Visita'),
      row('Más faltas','+1','Local / Empate / Visita'),
      row('Más offsides','+1','Local / Empate / Visita'),
      row('Tarjetas por equipo','+1','Local / Empate / Visita'),
      row('Parcial 1° tiempo','+1','Marcador exacto al 45\''),
      row("Resultado 90'",'+1','Marcador exacto al término de los 90 minutos reglamentarios'),
      row('Resultado final','+1','Marcador exacto incluyendo alargue (no penales)'),
      row('¿Hay alargue?','+2','Sí / No'),
      row('¿Hay penales?','+2','Sí / No'),

      sec('🔗 Correlaciones automáticas (elim.)'),
      e('div',{style:{fontSize:11,color:'#64748b',lineHeight:1.7}},
        e('div',null,'• Resultado 90\' sin empate → Alargue=No y Penales=No se completan solos'),
        e('div',null,'• Resultado Final con ganador claro → Ganador se completa solo'),
        e('div',null,'• Alargue=No → Penales=No automático'),
        e('div',null,'• Penales=Sí → requiere Alargue=Sí')
      ),

      sec('🔒 Bloqueo de votos'),
      e('div',{style:{fontSize:11,color:'#64748b',lineHeight:1.7}},
        e('div',null,'• Los votos se bloquean una vez que el admin ingresa el resultado del partido'),
        e('div',null,'• Los votos de otros jugadores se muestran como punto de color (sin revelar qué votaron)')
      ),

      sec('🏆 Elección de Campeón — sin puntos en tabla general'),
      e('div',{style:{fontSize:11,color:'#64748b',lineHeight:1.7}},
        e('div',null,'• Cada jugador elige un campeón antes de que comience el torneo. No suma puntos.'),
        e('div',null,'• El ganador de la Cartola es quien tenga más puntos acumulados (grupos + eliminatorias).'),
        e('div',null,'• 🏆 Copa de oro para el 1° lugar en la tabla de puntos.'),
        e('div',null,'• 🥈 Copa de plata para el 2° lugar en la tabla de puntos.'),
        e('div',null,'• El equipo campeón no se desempata por la elección de campeón.'),
        e('div',null,'• En caso de empate en puntos, gana quien haya acertado más partidos exactos (resultado final correcto).'),
        e('div',null,'• En la tabla aparece ✅ si el equipo elegido sigue en carrera, ❌ si ya fue eliminado.')
      ),

      sec('⚖️ Empate técnico en categorías'),
      e('div',{style:{fontSize:11,color:'#64748b',lineHeight:1.7}},
        e('div',null,'• Si hubo empate real en una categoría (ej: mismos offsides de cada equipo), el admin marca "Empate" como resultado.'),
        e('div',null,'• Los que votaron Empate reciben el punto. Los demás, no.'),
        e('div',null,'• Aparece "— +1" en gris cuando el resultado es empate técnico y no votaste Empate.')
      ),

      sec('📅 Próximos partidos'),
      e('div',{style:{fontSize:11,color:'#64748b'}},'En la Tabla de posiciones se muestran los próximos 3 partidos sin resultado, con fecha, hora, estadio y canal de transmisión en Chile.')
    )
  );
}
function App() {
  const [user,setUser]=useState(()=>{try{return localStorage.getItem('cn_user');}catch{return null;}});
  const [isAdmin,setIsAdmin]=useState(()=>{try{return localStorage.getItem('cn_admin')==='1';}catch{return false;}});
  const [tab,setTab]=useState('tabla');
  const [fdg,setFdg]=useState(E0());
  const [elim,setElim]=useState(E0());
  const [champ,setChamp]=useState({votes:{},real:null});
  const [sync,setSync]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [confirmClear,setConfirmClear]=useState(false);
  const fdgRef=useRef(fdg); const elimRef=useRef(elim); const champRef=useRef(champ);
  useEffect(()=>{fdgRef.current=fdg;},[fdg]);
  useEffect(()=>{elimRef.current=elim;},[elim]);
  useEffect(()=>{champRef.current=champ;},[champ]);

  const loadAll=useCallback(async()=>{
    const[f,e,c]=await Promise.all([lsGet(SK.fdg),lsGet(SK.elim),lsGet(SK.champs)]);
    if(f)setFdg(f); if(e)setElim(e); if(c)setChamp(c);
    setSync({ts:Date.now(),label:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  },[]);

  useEffect(()=>{loadAll();const t=setInterval(loadAll,20000);return()=>clearInterval(t);},[loadAll]);

  const handleSync=async()=>{setSyncing(true);await loadAll();setSyncing(false);};
  const login=(n,a)=>{setUser(n);setIsAdmin(a);try{localStorage.setItem('cn_user',n);localStorage.setItem('cn_admin',a?'1':'0');}catch{}};

  const vote=useCallback((id,k,v,type='fdg')=>{
    const [setD,ref,KEY]=type==='fdg'?[setFdg,fdgRef,SK.fdg]:[setElim,elimRef,SK.elim];
    setD(prev=>{const next={preds:{...prev.preds,[id]:{...prev.preds[id],[user]:{...(prev.preds[id]?.[user]||{}),[k]:v}}},results:prev.results};lsSet(KEY,{preds:{...ref.current.preds,[id]:{...ref.current.preds[id],[user]:{...(ref.current.preds[id]?.[user]||{}),[k]:v}}},results:ref.current.results});return next;});
  },[user]);

  const result=useCallback((id,k,v,type='fdg')=>{
    const [setD,ref,KEY]=type==='fdg'?[setFdg,fdgRef,SK.fdg]:[setElim,elimRef,SK.elim];
    if(id==='__b3slots__') {
      // v is the full new results object with b3slots already merged
      setD(prev=>{const next={preds:prev.preds,results:v};lsSet(KEY,{preds:ref.current.preds,results:v});return next;});
      return;
    }
    setD(prev=>{const next={preds:prev.preds,results:{...prev.results,[id]:{...prev.results[id],[k]:v}}};lsSet(KEY,{preds:ref.current.preds,results:{...ref.current.results,[id]:{...ref.current.results[id],[k]:v}}});return next;});
  },[]);

  const cVote=useCallback(t=>{setChamp(p=>{const n={...p,votes:{...p.votes,[user]:t}};lsSet(SK.champs,{...champRef.current,votes:{...champRef.current.votes,[user]:t}});return n;});},[user]);
  const cReal=useCallback(t=>{setChamp(p=>{const n={...p,real:t};lsSet(SK.champs,{...champRef.current,real:t});return n;});},[]);

  const clearAll=async()=>{
    const nF={preds:{},results:fdgRef.current.results};
    const nE={preds:{},results:elimRef.current.results};
    const nC={votes:{},real:champRef.current.real};
    setFdg(nF);setElim(nE);setChamp(nC);await Promise.all([lsSet(SK.fdg,nF),lsSet(SK.elim,nE),lsSet(SK.champs,nC)]);setConfirmClear(false);
  };

  if(!user)return React.createElement(React.Fragment,null,React.createElement('style',null,css),React.createElement(LoginScreen,{onLogin:login}));

  const tabs=[{id:'tabla',l:'🏆 Tabla'},{id:'grupos',l:'⚽ Grupos'},{id:'pos',l:'📊 Posiciones'},{id:'elim',l:'🏟️ Elim.'},{id:'camp',l:'🏆 Campeón'},{id:'reglas',l:'📋 Reglas'}];
  const e=React.createElement;

  return e(React.Fragment,null,
    e('style',null,css),
    e('div',{className:'hdr'},
      e('div',{className:'logo'},'SAL DE LA NORIA ',e('em',null,'· Mundial 2026')),
      e('div',{className:'hacts'},
        e(SyncBtn,{sync,syncing,onClick:handleSync}),
        isAdmin&&(confirmClear
          ?e('span',{style:{display:'flex',gap:5,alignItems:'center'}},
              e('span',{style:{fontSize:11,color:'#FCA5A5'}},'¿Borrar predicciones?'),
              e('button',{onClick:clearAll,style:{background:'#B91C1C',border:'none',borderRadius:5,padding:'3px 8px',color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:500}},'Sí'),
              e('button',{className:'hb',onClick:()=>setConfirmClear(false)},'No')
            )
          :e('button',{className:'clr-btn',onClick:()=>setConfirmClear(true)},'🗑 Limpiar')
        ),
        e('div',{className:'ubadge',onClick:()=>{try{localStorage.removeItem('cn_user');localStorage.removeItem('cn_admin');}catch{}setUser(null);setIsAdmin(false);}},`${isAdmin?'🔧':'👤'} ${user}`)
      )
    ),
    e('div',{className:'nav'},...tabs.map(t=>e('button',{key:t.id,className:`ntab${tab===t.id?' on':''}`,onClick:()=>setTab(t.id)},t.l))),
    tab==='tabla'&&e(Tabla,{fdg,elim,champ}),
    tab==='grupos'&&e(GruposView,{user,isAdmin,fdg,onVote:vote,onResult:result}),
    tab==='pos'&&e(PosicionesView,{fdg}),
    tab==='elim'&&e(EliminatoriasView,{user,isAdmin,elim,fdg,onVote:vote,onResult:result}),
    tab==='camp'&&e(CampeonView,{user,isAdmin,champ,onVote:cVote,onReal:cReal}),
    tab==='reglas'&&e(ReglasView,null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
