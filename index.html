async function lsGet(k) {

    const r = await fetch(`${GAS_URL}?action=get&key=${encodeURIComponent(k)}`);
    const j = await r.json();
    return j.value ? JSON.parse(j.value) : null;
  } catch { return null; }
}

function scoreMatch(p,r,isElim){
  if(!p||!r)return 0;
  let s=0;
  if(r.g&&p.g===r.g)s+=3;
  for(const k of['gol','rem','fal','off','tar'])if(r[k]&&p[k]===r[k])s++;
  if(r.par&&p.par&&r.par.toLowerCase()===p.par.toLowerCase())s++;
  if(r.res90&&p.res90&&r.res90.toLowerCase()===p.res90.toLowerCase())s++;
  if(r.fin&&p.fin&&r.fin.toLowerCase()===p.fin.toLowerCase())s++;
  if(isElim){
    if(r.ala&&p.ala===r.ala)s+=2;
    if(r.pen&&p.pen===r.pen)s+=2;
  }
  return s;
}
// Feedback por categoría: 'ok'|'bad'|null
// En elim, 'E' es una opción válida de botón — quien votó 'E' gana si el resultado es 'E'
function catResult(k,p,r){
  if(!r||!p)return null;
  const rv=r[k]; const pv=p[k];
  if(!rv||!pv)return null;
  return pv===rv?'ok':'bad';
}

function calcStandings(g, res) {
  const t = {};
  GR[g].forEach(([n,f]) => t[n]={n,f,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0,tj:0});
  FDG.filter(m=>m[1]===g).forEach(m=>{
    const r=res?.[m[0]]; if(!r)return;
    const L=t[m[3]], V=t[m[4]]; if(!L||!V)return;
    let gl=NaN, gv=NaN;
    if(r.fin){const p=r.fin.trim().split('-').map(Number); if(p.length===2&&p.every(x=>!isNaN(x)&&x>=0)){gl=p[0];gv=p[1];}}
    if(!isNaN(gl)&&!isNaN(gv)){
      L.pj++;V.pj++;L.gf+=gl;L.gc+=gv;L.dg+=gl-gv;V.gf+=gv;V.gc+=gl;V.dg+=gv-gl;
      if(r.cl)L.tj+=Number(r.cl)||0; if(r.cv)V.tj+=Number(r.cv)||0;
      if(gl>gv){L.pg++;L.pts+=3;V.pp++;}
      else if(gl===gv){L.pe++;L.pts++;V.pe++;V.pts++;}
      else{V.pg++;V.pts+=3;L.pp++;}
    } else if(r.g){
      L.pj++;V.pj++;
      if(r.g==='L'){L.pg++;L.pts+=3;V.pp++;}
      else if(r.g==='E'){L.pe++;L.pts++;V.pe++;V.pts++;}
      else{V.pg++;V.pts+=3;L.pp++;}
    }
  });
  return Object.values(t).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.tj-b.tj);
}

// Calcula los mejores terceros de todos los grupos, ordenados por criterios FIFA
function getBestThirds(fR) {
  // Criterio FIFA oficial: PTS → DG → GF → Fair Play (menos tarjetas) → Ranking FIFA (no disponible, orden alfabético como fallback)
  return GK
    .map(g => { const s = calcStandings(g, fR); const t = s[2]; return t ? {...t, grp: g} : null; })
    .filter(Boolean)
    .sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.tj-b.tj || a.n.localeCompare(b.n));
}

// Tabla FIFA: dado el conjunto de grupos de los 8 mejores terceros (ordenados alfabéticamente),
// indica qué tercero (por índice 0-7 en el ranking) va a qué partido (por ID).
// La asignación de mejores terceros a partidos específicos usa el Anexo C de FIFA
// con 495 combinaciones según qué grupos produjeron los 8 mejores terceros.
// No es posicional — el admin debe asignarlos manualmente una vez conocidos los 8.
// Los datos se guardan en eRes bajo la clave 'b3slots': { matchId: {n, f} }
function getB3Slots(eR) {
  return eR?.b3slots || {};
}

function resolveRef(ref, fR, eR, b3assigned, matchId) {
  // Direct hardcoded team with flag emoji — return as-is
  if(ref && /^\p{Emoji}/u.test(ref)) return ref;

  // 1°/2° de grupo
  const gm = ref && ref.match(/^(\d)° Grupo ([A-L])$/);
  if(gm){ const s=calcStandings(gm[2],fR); const i=parseInt(gm[1])-1; return s[i]?`${s[i].f} ${s[i].n}`:ref; }

  // Mejor 3° — asignación manual del admin
  if(ref==='Mejor 3°') {
    if(b3assigned && matchId && b3assigned[matchId]) {
      const t = b3assigned[matchId];
      return `${t.f} ${t.n}`;
    }
    const b3 = getBestThirds(fR);
    const done = GK.filter(g => { const s=calcStandings(g,fR); return s.length>0&&s[0].pj===3; }).length;
    if(done < 12 || b3.length === 0) return 'Mejor 3° ⏳';
    return 'Mejor 3° (sin asignar)';
  }

  // Gan. PXX
  const gn = ref && ref.match(/^Gan\. P(\d+)$/);
  if(gn){ const id=parseInt(gn[1]),r=eR?.[id]; if(!r?.fin)return ref; const[gl,gv]=r.fin.split('-').map(Number); if(isNaN(gl)||isNaN(gv))return ref; const m=ELIM.find(x=>x[0]===id); if(!m)return ref; return gl>gv?resolveRef(m[3],fR,eR,b3assigned,id):resolveRef(m[4],fR,eR,b3assigned,id); }

  // Perd. PXX
  const pn = ref && ref.match(/^Perd\. P(\d+)$/);
  if(pn){ const id=parseInt(pn[1]),r=eR?.[id]; if(!r?.fin)return ref; const[gl,gv]=r.fin.split('-').map(Number); if(isNaN(gl)||isNaN(gv))return ref; const m=ELIM.find(x=>x[0]===id); if(!m)return ref; return gl>gv?resolveRef(m[4],fR,eR,b3assigned,id):resolveRef(m[3],fR,eR,b3assigned,id); }

  return ref;
}

function Chips({code}){
  const show=['DS','PM'];
  if(code==='DC'||code==='DCD')show.push('CH');
  if(code==='DD'||code==='DCD')show.push('DP');
  return React.createElement('span',{style:{display:'inline-flex',gap:2,verticalAlign:'middle',flexWrap:'wrap'}},

  );
}

// ── Próximos partidos helper ───────────────────────────────────────────────
// Convierte "JUE 11-jun 15:00" a Date comparable (año 2026 implícito)
const MES = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11,
              ene:0,abr:3,may2:4};
function matchDate(dateStr) {
  // formato: "JUE 11-jun 15:00" — hora en hora chilena (America/Santiago)
  const m = dateStr.match(/(\d+)-(\w+)\s+(\d+):(\d+)/);
  if (!m) return new Date(9999,0,1);
  const day = parseInt(m[1]);
  const monStr = m[2].toLowerCase();
  const hour = parseInt(m[3]), min = parseInt(m[4]);
  const monMap = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const mon = monMap[monStr] ?? 5;
  return new Date(2026, mon, day, hour, min);
}

function isMatchStarted(dateStr) {
  // Verdadero si la hora actual (Chile) ya superó la hora de inicio del partido
  // Los datos ya están en hora Chile, y el navegador usa la zona horaria local del usuario.
  // Para garantizar consistencia, comparamos contra hora de Santiago explícitamente.
  const kickoff = matchDate(dateStr);
  const nowChile = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Santiago'}));
  return nowChile >= kickoff;
}

function getNextMatches(fdgResults, elimResults, n=3) {
  const now = new Date();
  const eR = elimResults || {};
  const fR = fdgResults || {};
  const b3slots = getB3Slots(eR);
  const allMatches = [
    ...FDG.map(m=>({id:m[0],type:'fdg',date:matchDate(m[2]),label:m[2],
      local:`${m[5]} ${m[3]}`,visita:`${m[6]} ${m[4]}`,
      bcCode:BC[String(m[0])],
      played:!!(fR[m[0]]?.g || fR[m[0]]?.fin)})),
    ...ELIM.map(m=>({id:m[0],type:'elim',date:matchDate(m[2]),label:m[2],
      local:resolveRef(m[3],fR,eR,b3slots,m[0]),
      visita:resolveRef(m[4],fR,eR,b3slots,m[0]),
      bcCode:BCE[m[1]]||'DC',rnd:RL[m[1]]||m[1],
      played:!!(eR[m[0]]?.g || eR[m[0]]?.fin)}))
  ];
  return allMatches
    .filter(m=>!m.played)
    .sort((a,b)=>a.date-b.date)
    .slice(0,n);
}

function getEliminatedTeams(fR, eR) {

  {k:'g',  l:'Ganador',   p:3},
  {k:'gol',l:'1° Gol',    p:1},
  {k:'rem',l:'Remates',   p:1},
  {k:'fal',l:'Faltas',    p:1},

  {k:'tar',l:'1era Tarj.',p:1},
  {k:'par',l:'Parcial',   p:1},
  {k:'fin',l:'Final',     p:1},
];
const CATS_ELIM_LABELS = [
  {k:'g',   l:'Ganador',   p:3},
  {k:'gol', l:'1° Gol',    p:1},
  {k:'rem', l:'Remates',   p:1},
  {k:'fal', l:'Faltas',    p:1},
  {k:'off', l:'Offsides',  p:1},

  {k:'res90',l:"Res. 90'", p:1},
  {k:'fin', l:'Final',     p:1},
  {k:'ala', l:'Alargue',   p:2},
  {k:'pen', l:'Penales',   p:2},
];

function calcPlayerCatStats(player, matches, preds, results, catList) {
  // Returns {k: {earned, possible}} for each category
  const stats = {};
  catList.forEach(c => { stats[c.k] = {earned:0, possible:0}; });
  matches.forEach(m => {
    const id = m[0];
    const p = preds?.[id]?.[player];
    const r = results?.[id];
    if(!p || !r) return;
    catList.forEach(c => {
      // Check if player voted this category
      if(!p[c.k]) return;
      stats[c.k].possible += c.p;
      // Score
      if(c.k==='g'&&r.g&&p.g===r.g) stats[c.k].earned+=3;
      else if(['gol','rem','fal','off','tar'].includes(c.k)&&r[c.k]&&p[c.k]===r[c.k]) stats[c.k].earned++;
      else if(c.k==='par'&&r.par&&p.par&&r.par.toLowerCase()===p.par.toLowerCase()) stats[c.k].earned++;
      else if(c.k==='res90'&&r.res90&&p.res90&&r.res90.toLowerCase()===p.res90.toLowerCase()) stats[c.k].earned++;
      else if(c.k==='fin'&&r.fin&&p.fin&&r.fin.toLowerCase()===p.fin.toLowerCase()) stats[c.k].earned++;
      else if(c.k==='ala'&&r.ala&&p.ala===r.ala) stats[c.k].earned+=2;
      else if(c.k==='pen'&&r.pen&&p.pen===r.pen) stats[c.k].earned+=2;
    });
  });
  return stats;
}

function RadarChart({ catLabels, allPlayerStats, size }) {
  // allPlayerStats: [{player, color, stats}]
  const e = React.createElement;
  const n = catLabels.length;
  const cx = size/2, cy = size/2;
  const R = size * 0.34;
  const labelR = size * 0.46;
  const rings = [0.25, 0.5, 0.75, 1.0];
  const angle = i => (Math.PI*2*i/n) - Math.PI/2;
  const pt = (r,i) => [cx + r*Math.cos(angle(i)), cy + r*Math.sin(angle(i))];

  // Grid rings
  const ringPaths = rings.map((f,ri) => {
    const pts = catLabels.map((_,i) => pt(R*f,i));
    const d = pts.map((p,i) => (i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ')+'Z';
    return e('path',{key:'ring'+ri,d,fill:'none',stroke:'#1E3A6B',strokeWidth:ri===3?1.5:0.5,opacity:0.5});
  });

  // Axes
  const axes = catLabels.map((_,i) => {
    const [x,y] = pt(R,i);
    return e('line',{key:'ax'+i,x1:cx,y1:cy,x2:x,y2:y,stroke:'#1E3A6B',strokeWidth:1});
  });

  // One polygon per player
  const polygons = allPlayerStats.map(({player,color,stats}) => {
    const pts = catLabels.map((c,i) => {
      const st = stats[c.k];
      const ratio = st && st.possible>0 ? Math.min(st.earned/st.possible,1) : 0;
      return pt(R*ratio,i);
    });
    const d = pts.map((p,i) => (i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ')+'Z';
    return e('path',{key:'poly'+player,d,fill:color,fillOpacity:0.18,stroke:color,strokeWidth:2});
  });

  // Labels with per-player colored stats
  const labels = catLabels.map((c,i) => {
    const [lx,ly] = pt(labelR,i);
    const anchor = lx < cx-8 ? 'end' : lx > cx+8 ? 'start' : 'middle';
    // Build stat lines per player
    const statLines = allPlayerStats.map(({player,color,stats}) => {
      const st = stats[c.k];
      return {color, text: st && st.possible>0 ? `${st.earned}/${st.possible}` : '-'};
    });
    return e('text',{key:'lbl'+i,x:lx,y:ly,textAnchor:anchor,dominantBaseline:'middle',
      fontSize:9,fill:'#64748b',fontFamily:'system-ui'},
      e('tspan',{x:lx,dy:0},c.l),
      ...statLines.map(({color,text},si) =>
        e('tspan',{key:si,x:lx,dy:10,fill:color,fontWeight:'bold',fontSize:8},
          si>0 ? ' · '+text : text
        )
      )
    );
  });

  return e('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{overflow:'visible'}},
    ...ringPaths, ...axes, ...polygons, ...labels
  );
}

// Phase definitions: label, match IDs from FDG+ELIM
const TREND_PHASES = [
  {label:'J1 Grupos',  ids: Array.from({length:24}, (_,i)=>i+1),   type:'fdg'},
  {label:'J2 Grupos',  ids: Array.from({length:24}, (_,i)=>i+25),  type:'fdg'},
  {label:'J3 Grupos',  ids: Array.from({length:24}, (_,i)=>i+49),  type:'fdg'},
  {label:'Ronda 32',   ids: Array.from({length:16}, (_,i)=>i+73),  type:'elim'},
  {label:'Octavos',    ids: Array.from({length:8},  (_,i)=>i+89),  type:'elim'},
  {label:'Cuartos',    ids: Array.from({length:4},  (_,i)=>i+97),  type:'elim'},
  {label:'Semifinal',  ids:[101,102],                               type:'elim'},
  {label:'3°/Final',   ids:[103,104],                               type:'elim'},
];

function calcTrendPoints(player, fdgPreds, fdgResults, elimPreds, elimResults) {
  // Returns array of {label, pts, cum} only for phases with at least 1 result
  let cumulative = 0;
  const result = [];
  for(const ph of TREND_PHASES) {
    const results = ph.type==='fdg' ? fdgResults : elimResults;
    const hasResult = ph.ids.some(id => results?.[id] && (results[id].g || results[id].fin));
    if(!hasResult) break; // stop at first phase with no results yet
    let phPts = 0;
    ph.ids.forEach(id => {
      const p = ph.type==='fdg' ? fdgPreds?.[id]?.[player] : elimPreds?.[id]?.[player];
      const r = ph.type==='fdg' ? fdgResults?.[id] : elimResults?.[id];
      phPts += scoreMatch(p, r, ph.type==='elim');
    });
    cumulative += phPts;
    result.push({label: ph.label, pts: phPts, cum: cumulative});
  }
  return result;
}

// Returns trend data for ALL players at once, with positions at each phase
function calcAllTrends(fdgPreds, fdgResults, elimPreds, elimResults) {
  const byPlayer = {};
  PLAYERS.forEach(p => {
    byPlayer[p] = calcTrendPoints(p, fdgPreds, fdgResults, elimPreds, elimResults);
  });
  return byPlayer;
}

function calcRaceTrend(fdgPreds, fdgResults, elimPreds, elimResults) {
  // Returns [{label, rankings:[{player,pos,cum}]}] per phase with results
  const byPlayer = calcAllTrends(fdgPreds, fdgResults, elimPreds, elimResults);
  // Find phases that have data (use first player as reference)
  const refTrend = byPlayer[PLAYERS[0]];
  if(!refTrend || refTrend.length === 0) return [];
  return refTrend.map((ph, i) => {
    const standings = PLAYERS.map(p => ({
      player: p,
      cum: byPlayer[p]?.[i]?.cum || 0
    })).sort((a,b) => b.cum - a.cum);
    return {
      label: ph.label,
      rankings: standings.map((s,rank) => ({...s, pos: rank+1}))
    };
  });
}

function TrendChart({ allPlayerData, size }) {
  // allPlayerData: [{player, color, trend:[{label,pts,cum}]}]
  const e = React.createElement;
  const W = size, H = Math.round(size * 0.55);
  const PAD = {top:20, right:16, bottom:48, left:38};
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const n = TREND_PHASES.length; // 8 phases

  // Max cumulative pts across all players for Y scale
  const allCums = allPlayerData.flatMap(d => d.trend.map(t => t.cum));
  const maxPts = Math.max(...allCums, 1);
  // Round up to nice number
  const yMax = Math.ceil(maxPts / 50) * 50 || 50;

  const xScale = i => PAD.left + (i / (n-1)) * chartW;
  const yScale = v => PAD.top + chartH - (v / yMax) * chartH;

  // Y gridlines + labels
  const yTicks = [];
  const yStep = yMax <= 100 ? 20 : yMax <= 300 ? 50 : 100;
  for(let v = 0; v <= yMax; v += yStep) {
    const y = yScale(v);
    yTicks.push(
      e('line',{key:'yg'+v, x1:PAD.left, y1:y, x2:W-PAD.right, y2:y,
        stroke:'#E2E8F0', strokeWidth:1}),
      e('text',{key:'yl'+v, x:PAD.left-4, y:y, textAnchor:'end',
        dominantBaseline:'middle', fontSize:8, fill:'#94a3b8'}, v)
    );
  }

  // X axis labels (phase names)
  const xLabels = TREND_PHASES.map((ph,i) => {
    const x = xScale(i);
    const isElim = ph.type==='elim';
    return e('text',{key:'xl'+i, x, y:H-PAD.bottom+12,
      textAnchor:'middle', fontSize:8,
      fill: isElim ? '#F59E0B' : '#64748b',
      fontWeight: isElim ? '600' : '400'
    }, ph.label);
  });

  // Vertical separator between groups and elim
  const sepX = (xScale(2) + xScale(3)) / 2;
  const separator = [
    e('line',{key:'sep', x1:sepX, y1:PAD.top, x2:sepX, y2:PAD.top+chartH,
      stroke:'#F59E0B', strokeWidth:1, strokeDasharray:'3,3', opacity:0.5}),
    e('text',{key:'sep-g', x:PAD.left+2, y:PAD.top-6, fontSize:7, fill:'#64748b'},'GRUPOS'),
    e('text',{key:'sep-e', x:sepX+3, y:PAD.top-6, fontSize:7, fill:'#F59E0B'},'ELIMINATORIAS'),
  ];

  // Player lines + dots
  const playerElems = allPlayerData.flatMap(({player, color, trend}) => {
    const pts = trend.map((t,i) => [xScale(i), yScale(t.cum)]);
    const pathD = pts.map(([x,y],i) => (i===0?`M${x},${y}`:`L${x},${y}`)).join(' ');
    const elems = [
      e('path',{key:'line'+player, d:pathD,
        fill:'none', stroke:color, strokeWidth:2.5, strokeLinejoin:'round', strokeLinecap:'round'})
    ];
    trend.forEach((t,i) => {
      const [x,y] = pts[i];
      elems.push(
        e('circle',{key:'dot'+player+i, cx:x, cy:y, r:3.5,
          fill:'#fff', stroke:color, strokeWidth:2}),
        // Tooltip-style label on last point
        i === trend.length-1 && e('text',{key:'end'+player,
          x:x+5, y:y, fontSize:8, fill:color, fontWeight:'bold',
          dominantBaseline:'middle'}, t.cum+'')
      );
    });
    return elems;
  });

  // Axes
  const axes = [
    e('line',{key:'ax', x1:PAD.left, y1:PAD.top, x2:PAD.left, y2:PAD.top+chartH,
      stroke:'#CBD5E1', strokeWidth:1}),
    e('line',{key:'ay', x1:PAD.left, y1:PAD.top+chartH, x2:W-PAD.right, y2:PAD.top+chartH,
      stroke:'#CBD5E1', strokeWidth:1}),
    e('text',{key:'yaxis', x:10, y:PAD.top+chartH/2,
      textAnchor:'middle', fontSize:8, fill:'#64748b',
      transform:`rotate(-90,10,${PAD.top+chartH/2})`}, 'Puntos acumulados'),
  ];

  return e('svg',{width:W, height:H, viewBox:`0 0 ${W} ${H}`, style:{overflow:'visible'}},
    ...yTicks, ...separator, ...axes, ...playerElems, ...xLabels
  );
}


function RaceChart({ raceData, activePlayers, size }) {
  // raceData: [{label, rankings:[{player,pos,cum}]}]
  // Y axis: position 1 (top) to 7 (bottom)
  const e = React.createElement;
  if(!raceData || raceData.length === 0) return e('div',{style:{textAlign:'center',color:'#94a3b8',padding:20,fontSize:12}},'Sin datos aún');

  const W = size, H = Math.round(size * 0.65);
  const PAD = {top:24, right:50, bottom:48, left:32};
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const nPhases = raceData.length;
  const nPlayers = PLAYERS.length; // 7

  const xScale = i => PAD.left + (i / Math.max(nPhases-1,1)) * chartW;
  // Position 1 at top, 7 at bottom
  const yScale = pos => PAD.top + ((pos-1) / (nPlayers-1)) * chartH;

  // Grid lines (horizontal per position)
  const yGrid = Array.from({length:nPlayers},(_,i) => {
    const pos = i+1;
    const y = yScale(pos);
    return [
      e('line',{key:'yg'+pos, x1:PAD.left, y1:y, x2:W-PAD.right, y2:y,
        stroke:'#E2E8F0', strokeWidth:1}),
      e('text',{key:'yl'+pos, x:PAD.left-4, y, textAnchor:'end',
        dominantBaseline:'middle', fontSize:8, fill:'#94a3b8'}, pos+'°')
    ];
  }).flat();

  // X axis labels
  const xLabels = raceData.map((ph,i) => {
    const x = xScale(i);
    const isElim = !['J1 Grupos','J2 Grupos','J3 Grupos'].includes(ph.label);
    return e('text',{key:'xl'+i, x, y:H-PAD.bottom+12,
      textAnchor:'middle', fontSize:8,
      fill: isElim?'#F59E0B':'#64748b',
      fontWeight: isElim?'600':'400'
    }, ph.label);
  });

  // Separator between grupos / elim
  const groupPhases = raceData.filter(ph=>['J1 Grupos','J2 Grupos','J3 Grupos'].includes(ph.label)).length;
  const sepElems = groupPhases > 0 && groupPhases < nPhases ? [
    e('line',{key:'sep',
      x1:(xScale(groupPhases-1)+xScale(groupPhases))/2, y1:PAD.top,
      x2:(xScale(groupPhases-1)+xScale(groupPhases))/2, y2:PAD.top+chartH,
      stroke:'#F59E0B', strokeWidth:1, strokeDasharray:'3,3', opacity:0.5}),
    e('text',{key:'sg', x:PAD.left+2, y:PAD.top-10, fontSize:7, fill:'#64748b'},'GRUPOS'),
    e('text',{key:'se', x:(xScale(groupPhases-1)+xScale(groupPhases))/2+3, y:PAD.top-10, fontSize:7, fill:'#F59E0B'},'ELIMINATORIAS'),
  ] : [];

  // One line per active player
  const playerLines = activePlayers.map(player => {
    const color = PC[player];
    // Get position at each phase
    const positions = raceData.map(ph => {
      const r = ph.rankings.find(r=>r.player===player);
      return r ? r.pos : nPlayers;
    });
    const pts = positions.map((pos,i) => [xScale(i), yScale(pos)]);
    const d = pts.map(([x,y],i) => (i===0?`M${x},${y}`:`L${x},${y}`)).join(' ');

    const dots = pts.map(([x,y],i) =>
      e('circle',{key:'d'+player+i, cx:x, cy:y, r:3.5, fill:'#fff', stroke:color, strokeWidth:2})
    );

    // End label: player name + position at last phase
    const [lastX, lastY] = pts[pts.length-1];
    const lastPos = positions[positions.length-1];
    const endLabel = e('text',{key:'end'+player,
      x:lastX+6, y:lastY, fontSize:8, fill:color, fontWeight:'bold',
      dominantBaseline:'middle'},
      player+' '+lastPos+'°'
    );

    return [
      e('path',{key:'l'+player, d, fill:'none', stroke:color,
        strokeWidth:2.5, strokeLinejoin:'round', strokeLinecap:'round'}),
      ...dots, endLabel
    ];
  }).flat();

  // Axes
  const axes = [
    e('line',{key:'axv', x1:PAD.left, y1:PAD.top, x2:PAD.left, y2:PAD.top+chartH, stroke:'#CBD5E1', strokeWidth:1}),
    e('line',{key:'axh', x1:PAD.left, y1:PAD.top+chartH, x2:W-PAD.right, y2:PAD.top+chartH, stroke:'#CBD5E1', strokeWidth:1}),
    e('text',{key:'ylabel', x:11, y:PAD.top+chartH/2, textAnchor:'middle', fontSize:8, fill:'#64748b',
      transform:`rotate(-90,11,${PAD.top+chartH/2})`},'Posición'),
  ];

  return e('svg',{width:W, height:H, viewBox:`0 0 ${W} ${H}`, style:{overflow:'visible'}},
    ...yGrid, ...sepElems, ...axes, ...playerLines, ...xLabels
  );
}

function App() {
  const [user,setUser]=useState(()=>{try{return localStorage.getItem('cn_user');}catch{return null;}});
  const [isAdmin,setIsAdmin]=useState(()=>{try{return localStorage.getItem('cn_admin')==='1';}catch{return false;}});
  const [tab,setTab]=useState('tabla');
  const [elimRnd,setElimRnd]=useState('R32');
  const [elimTab,setElimTab]=useState('fixture');
  const [statsPlayer,setStatsPlayer]=useState(PLAYERS[0]);
  const [fdg,setFdg]=useState(E0());
  const [elim,setElim]=useState(E0());
  const [champ,setChamp]=useState({votes:{},real:null});
  const [sync,setSync]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [confirmClear,setConfirmClear]=useState(false);
  const fdgRef=useRef(fdg); const elimRef=useRef(elim); const champRef=useRef(champ);
  useEffect(()=>{fdgRef.current=fdg;},[fdg]);
  useEffect(()=>{elimRef.current=elim;},[elim]);
  useEffect(()=>{champRef.current=champ;},[champ]);

  const loadAll=useCallback(async()=>{
    const[f,e,c]=await Promise.all([lsGet(SK.fdg),lsGet(SK.elim),lsGet(SK.champs)]);
    if(f)setFdg(f); if(e)setElim(e); if(c)setChamp(c);
    setSync({ts:Date.now(),label:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  },[]);

  useEffect(()=>{loadAll();const t=setInterval(loadAll,20000);return()=>clearInterval(t);},[loadAll]);

  const handleSync=async()=>{setSyncing(true);await loadAll();setSyncing(false);};
  const onNavigate=(m)=>{
    if(m.type==='elim'){
      const em=ELIM.find(x=>x[0]===m.id);
      if(em){setElimRnd(em[1]);setElimTab('partidos');}
      setTab('elim');
    } else if(m.type==='estadisticas'){
      if(m.player) setStatsPlayer(m.player);
      setTab('estadisticas');
    } else { setTab('grupos'); }
  };
  const login=(n,a)=>{setUser(n);setIsAdmin(a);try{localStorage.setItem('cn_user',n);localStorage.setItem('cn_admin',a?'1':'0');}catch{}};

  // vote(id, k, v, type) — single field
  // vote(id, [[k1,v1],[k2,v2],...], null, type) — batch fields atomically
  const vote=useCallback((id,kOrPairs,v,type='fdg')=>{
    const [setD,ref,KEY]=type==='fdg'?[setFdg,fdgRef,SK.fdg]:[setElim,elimRef,SK.elim];
    const pairs = Array.isArray(kOrPairs) ? kOrPairs : [[kOrPairs,v]];
    setD(prev=>{
      const userPrev = prev.preds[id]?.[user] || {};
      const userNext = {...userPrev};
      pairs.forEach(([k,val])=>{ userNext[k]=val; });
      const newPreds = {...prev.preds,[id]:{...prev.preds[id],[user]:userNext}};
      const next = {preds:newPreds, results:prev.results};
      // lsSet uses the freshly computed state, not stale ref
      lsSet(KEY,{preds:newPreds, results:ref.current.results});
      return next;
    });
  },[user]);

  // result(id, kOrPairs, v, type) — single or batch field updates for results
  const result=useCallback((id,kOrPairs,v,type='fdg')=>{
    const [setD,ref,KEY]=type==='fdg'?[setFdg,fdgRef,SK.fdg]:[setElim,elimRef,SK.elim];
    if(id==='__b3slots__') {
      setD(prev=>{const next={preds:prev.preds,results:v};lsSet(KEY,{preds:ref.current.preds,results:v});return next;});
      return;
    }
    const pairs = Array.isArray(kOrPairs) ? kOrPairs : [[kOrPairs,v]];
    setD(prev=>{
      const matchPrev = prev.results[id] || {};
      const matchNext = {...matchPrev};
      pairs.forEach(([k,val])=>{ matchNext[k]=val; });
      const newResults = {...prev.results,[id]:matchNext};
      const next = {preds:prev.preds, results:newResults};
      lsSet(KEY,{preds:ref.current.preds, results:newResults});
      return next;
    });
  },[]);

  const cVote=useCallback(t=>{setChamp(p=>{const n={...p,votes:{...p.votes,[user]:t}};lsSet(SK.champs,{...champRef.current,votes:{...champRef.current.votes,[user]:t}});return n;});},[user]);
  const cReal=useCallback(t=>{setChamp(p=>{const n={...p,real:t};lsSet(SK.champs,{...champRef.current,real:t});return n;});},[]);

  const clearAll=async()=>{
    const nF={preds:{},results:fdgRef.current.results};
    const nE={preds:{},results:elimRef.current.results};
    const nC={votes:{},real:champRef.current.real};
    setFdg(nF);setElim(nE);setChamp(nC);await Promise.all([lsSet(SK.fdg,nF),lsSet(SK.elim,nE),lsSet(SK.champs,nC)]);setConfirmClear(false);
  };

  if(!user)return React.createElement(React.Fragment,null,React.createElement('style',null,css),React.createElement(LoginScreen,{onLogin:login}));

  const tabs=[{id:'tabla',l:'🏆 Tabla'},{id:'grupos',l:'⚽ Grupos'},{id:'pos',l:'📈 Posiciones'},{id:'elim',l:'🏟️ Elim.'},{id:'camp',l:'🏆 Campeón'},{id:'reglas',l:'📋 Reglas'},{id:'estadisticas',l:'📊 Estadísticas'}];
  const e=React.createElement;

  return e(React.Fragment,null,
    e('style',null,css),
    e('div',{className:'hdr'},
      e('div',{className:'logo'},'SAL DE LA NORIA ',e('em',null,'· Mundial 2026')),
      e('div',{className:'hacts'},
        e(SyncBtn,{sync,syncing,onClick:handleSync}),
        isAdmin&&(confirmClear
          ?e('span',{style:{display:'flex',gap:5,alignItems:'center'}},
              e('span',{style:{fontSize:11,color:'#FCA5A5'}},'¿Borrar predicciones?'),
              e('button',{onClick:clearAll,style:{background:'#B91C1C',border:'none',borderRadius:5,padding:'3px 8px',color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:500}},'Sí'),
              e('button',{className:'hb',onClick:()=>setConfirmClear(false)},'No')
            )
          :e('button',{className:'clr-btn',onClick:()=>setConfirmClear(true)},'🗑 Limpiar')
        ),
        e('div',{className:'ubadge',onClick:()=>{try{localStorage.removeItem('cn_user');localStorage.removeItem('cn_admin');}catch{}setUser(null);setIsAdmin(false);}},`${isAdmin?'🔧':'👤'} ${user}`)
      )
    ),
    e('div',{className:'nav'},...tabs.map(t=>e('button',{key:t.id,className:`ntab${tab===t.id?' on':''}`,onClick:()=>setTab(t.id)},t.l))),
    tab==='tabla'&&e(Tabla,{fdg,elim,champ,onNavigate}),
    tab==='grupos'&&e(GruposView,{user,isAdmin,fdg,onVote:vote,onResult:result}),
    tab==='pos'&&e(PosicionesView,{fdg}),
    tab==='elim'&&e(EliminatoriasView,{user,isAdmin,elim,fdg,onVote:vote,onResult:result,initTab:elimTab,initRnd:elimRnd}),
    tab==='camp'&&e(CampeonView,{user,isAdmin,champ,onVote:cVote,onReal:cReal}),
    tab==='reglas'&&e(ReglasView,null),
    tab==='estadisticas'&&e(EstadisticasView,{fdg,elim,onNavigate,initPlayer:statsPlayer})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
